name: Publish

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # npm trusted publishing (OIDC) + provenance

jobs:
  publish:
    name: build, test, publish to npm
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: "24" # npm 11+ — required for trusted publishing OIDC
          cache: npm

      - name: Install
        run: npm ci

      - name: Type-check
        run: npm run tsc

      - name: Unit tests
        run: npm run test:unit

      - name: Integration tests
        run: npm run test:integration

      - name: Build
        run: npm run build

      - name: Spec lint
        run: node dist/cli.js lint

      - name: Verify tag matches package.json version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          tag="${GITHUB_REF#refs/tags/v}"
          pkg="$(node -p "require('./package.json').version")"
          if [ "$tag" != "$pkg" ]; then
            echo "Tag v$tag does not match package.json version $pkg" >&2
            exit 1
          fi

      - name: Publish to npm
        run: npm publish --provenance --access public
